<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutcracker — Викторина для детей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg: #1a2a3a;
            --card-bg: #2c4054;
            --gold: #f7c948;
            --green: #6fcf97;
            --red: #eb5757;
            --text: #f0f4fa;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 28px;
        }
        body {
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow: hidden;
        }
        #app {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            height: 100vh;
            max-height: 780px;
            display: flex;
            flex-direction: column;
            padding: 12px 16px 12px;
        }
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.5s ease;
            width: 100%;
            flex: 1 1 0;
            min-height: 0;
        }
        .screen.active {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        #mainScreen {
            justify-content: center;
        }
        #mainScreen .mascot-wrapper {
            margin-bottom: 0;
        }
        #mainScreen .title {
            margin-top: -4px;
        }
        #mainScreen .nuts-counter {
            margin-bottom: 8px;
        }
        .btn-start, .btn-forest, .btn-shop {
            flex-shrink: 0;
            margin-top: 6px;
        }
        .btn-secondary-group {
            margin-top: 4px;
        }

        .mascot-wrapper {
            display: inline-block;
            position: relative;
            cursor: pointer;
            user-select: none;
            line-height: 1;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }
        .mascot-wrapper.idle {
            animation: float 3s ease-in-out infinite;
        }
        .mascot-wrapper.happy {
            animation: bounceHappy 0.6s ease;
        }
        .mascot-wrapper.sad {
            animation: shakeSad 0.6s ease;
        }
        .mascot-wrapper.celebrate {
            animation: celebrate 0.8s ease infinite alternate;
        }
        .mascot-wrapper.tumble {
            animation: tumble 0.8s ease forwards;
        }
        .mascot-img {
            max-height: 150px;
            width: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes bounceHappy {
            0% { transform: scale(1); }
            30% { transform: scale(1.3) rotate(-8deg); }
            60% { transform: scale(0.9) rotate(4deg); }
            100% { transform: scale(1) rotate(0); }
        }
        @keyframes shakeSad {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-3deg); }
            40% { transform: translateX(8px) rotate(3deg); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        @keyframes celebrate {
            0% { transform: rotate(-4deg) scale(1); }
            100% { transform: rotate(4deg) scale(1.05); }
        }
        @keyframes tumble {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-15deg) scale(1.1) translateY(-15px); }
            50% { transform: rotate(0deg) scale(0.9) translateY(0px); }
            75% { transform: rotate(15deg) scale(1.1) translateY(-10px); }
            100% { transform: rotate(0deg) scale(1) translateY(0); }
        }
        .question-area.slide-up {
            animation: slideUpOut 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes slideUpOut {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(0.85); }
        }
        .title {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 4px 12px rgba(247, 201, 72, 0.3);
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .subtitle {
            font-size: 0.85rem;
            opacity: 0.8;
            font-weight: 500;
            flex-shrink: 0;
            margin-top: -6px;
        }
        .nuts-counter {
            background: rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 6px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
            margin-top: 2px;
        }
        .nuts-counter span {
            color: var(--gold);
        }
        .btn-start {
            background: linear-gradient(135deg, var(--gold), #f5a623);
            border: none;
            border-radius: 60px;
            padding: 16px 32px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a2a3a;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(247, 201, 72, 0.25);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
            letter-spacing: 1px;
            width: 100%;
            max-width: 280px;
            flex-shrink: 0;
            margin-top: 6px;
        }
        .btn-start:active {
            transform: scale(0.94);
            box-shadow: 0 2px 8px rgba(247, 201, 72, 0.15);
        }
        .btn-start.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
            background: #555;
            color: #aaa;
        }
        .btn-start.disabled:active {
            transform: none;
        }

        .btn-forest {
            background: linear-gradient(135deg, #2d7d46, #1a4a2a);
            border: 2px solid rgba(111, 207, 151, 0.25);
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 280px;
            letter-spacing: 1px;
            flex-shrink: 0;
            margin-top: 6px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            box-shadow: 0 4px 16px rgba(45, 125, 70, 0.3);
        }
        .btn-forest:active {
            transform: scale(0.94);
            box-shadow: 0 2px 8px rgba(45, 125, 70, 0.15);
        }

        .btn-shop {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border: 2px solid rgba(168, 85, 247, 0.3);
            border-radius: 60px;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 260px;
            letter-spacing: 1px;
            flex-shrink: 0;
            margin-top: 6px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            box-shadow: 0 4px 16px rgba(168, 85, 247, 0.3);
        }
        .btn-shop:active {
            transform: scale(0.94);
            box-shadow: 0 2px 8px rgba(168, 85, 247, 0.15);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 60px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
            max-width: 280px;
            text-align: center;
            flex-shrink: 0;
        }
        .btn-secondary:active {
            transform: scale(0.94);
            background: rgba(255,255,255,0.15);
        }
        .btn-secondary-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
            max-width: 280px;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .today-progress {
            font-size: 0.7rem;
            opacity: 0.4;
            margin-top: 4px;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2px;
            flex-shrink: 0;
        }
        .progress-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            transition: all 0.3s;
        }
        .dot.done {
            background: var(--green);
            transform: scale(1.1);
        }
        .dot.current {
            background: var(--gold);
            box-shadow: 0 0 20px rgba(247, 201, 72, 0.4);
            transform: scale(1.2);
        }
        .question-area {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 10px 14px;
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
            flex-shrink: 0;
        }
        .question-icon {
            font-size: 2.4rem;
            margin-bottom: 2px;
        }
        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.3;
            max-width: 90%;
        }
        .btn-tts {
            position: absolute;
            top: 4px;
            right: 8px;
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
        }
        .btn-tts:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.9);
        }
        .options {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 4px;
            transition: opacity 0.2s, pointer-events 0.2s;
            flex: 1 1 auto;
            min-height: 0;
            justify-content: center;
        }
        .options.disabled {
            pointer-events: none;
            opacity: 0.8;
        }
        .option-btn {
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(2px);
            text-align: left;
            min-height: 54px;
            position: relative;
        }
        .option-btn:active:not(.disabled) {
            transform: scale(0.95);
        }
        .option-btn .opt-icon {
            font-size: 1.8rem;
            flex-shrink: 0;
            color: var(--gold);
            font-weight: 700;
            width: 2rem;
            text-align: center;
        }
        .option-btn .opt-label {
            flex: 1;
        }
        .option-btn .opt-speak {
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--gold);
        }
        .option-btn .opt-speak:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.85);
        }
        .option-btn.correct {
            background: rgba(111, 207, 151, 0.25);
            border-color: var(--green);
            box-shadow: 0 0 30px rgba(111, 207, 151, 0.3);
            transform: scale(1.02);
        }
        .option-btn.wrong {
            background: rgba(235, 87, 87, 0.15);
            border-color: var(--red);
            opacity: 0.6;
            transform: scale(0.95);
        }
        .option-btn.disabled {
            pointer-events: none;
            opacity: 0.7;
        }
        .option-btn.disabled .opt-speak {
            opacity: 0.4;
            pointer-events: none;
        }
        .option-btn.reveal-correct {
            border-color: var(--green);
            background: rgba(111, 207, 151, 0.15);
        }
        .feedback-area {
            width: 100%;
            min-height: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 4px 0;
            border-radius: 16px;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .feedback-area .fun-fact {
            font-size: 0.85rem;
            opacity: 0.9;
            font-weight: 400;
            color: var(--gold);
            text-align: center;
        }
        .feedback-area .mascot-feedback {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .btn-next {
            background: var(--gold);
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 1.4rem;
            font-weight: 800;
            color: #1a2a3a;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: none;
            box-shadow: 0 4px 16px rgba(247, 201, 72, 0.2);
            margin-top: 6px;
            width: 100%;
            max-width: 260px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .btn-next:active {
            transform: scale(0.94);
        }
        .btn-next.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .result-icon {
            font-size: 3.6rem;
        }
        .result-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--gold);
        }
        .result-stats {
            font-size: 1rem;
            opacity: 0.8;
        }
        .btn-home {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 12px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }
        .btn-home:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.95);
        }
        .back-to-menu {
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 60px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: background 0.2s;
            align-self: flex-start;
            flex-shrink: 0;
        }
        .back-to-menu:active {
            background: rgba(255,255,255,0.12);
        }

        /* ===== МАГАЗИН ===== */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
            max-width: 400px;
            flex: 1 1 auto;
            align-content: start;
            overflow-y: auto;
            padding: 4px 0;
        }
        .shop-grid::-webkit-scrollbar {
            width: 0;
            height: 0;
        }
        .shop-item {
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 14px 10px;
            text-align: center;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .shop-item.equipped {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(247, 201, 72, 0.15);
        }
        .shop-item .preview {
            font-size: 3.6rem;
            line-height: 1;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .shop-item .preview img {
            max-height: 120px;
            width: auto;
            object-fit: contain;
        }
        .shop-item .name {
            font-size: 1rem;
            font-weight: 600;
        }
        .shop-item .price {
            font-size: 0.9rem;
            color: var(--gold);
        }
        .shop-item .btn-buy {
            background: var(--gold);
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #1a2a3a;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 4px;
            width: 100%;
            max-width: 140px;
        }
        .shop-item .btn-buy:active {
            transform: scale(0.94);
        }
        .shop-item .btn-buy.owned {
            background: rgba(255,255,255,0.08);
            color: var(--text);
        }
        .shop-item .btn-buy.equipped {
            background: var(--green);
            color: #1a2a3a;
            cursor: default;
            opacity: 0.7;
        }
        .shop-item .btn-buy.locked {
            background: #555;
            color: #aaa;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .shop-nuts {
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 700;
            margin: 4px 0;
        }

        .forest-container {
            width: 100%;
            flex: 1 1 0;
            min-height: 0;
            overflow-y: auto;
            border-radius: 20px;
            background: radial-gradient(ellipse at 30% 20%, #2d5a3d, #1a2f22);
            border: 2px solid rgba(255,255,255,0.06);
            box-shadow: inset 0 0 60px rgba(0,0,0,0.5);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
        .forest-container::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }
        .forest-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .forest-svg {
            width: 100%;
            height: auto;
            display: block;
            touch-action: none;
        }
        .forest-spot-group {
            cursor: pointer;
            transition: transform 0.15s;
        }
        .forest-spot-group:active {
            transform: none;
        }
        .forest-spot-circle {
            stroke: #fff;
            stroke-width: 3;
            filter: drop-shadow(0 0 16px rgba(247, 201, 72, 0.6));
            transition: r 0.2s;
        }
        .forest-spot-group:hover .forest-spot-circle {
            r: 34;
        }
        .forest-spot-text {
            fill: #1a2a3a;
            font-size: 26px;
            font-weight: 800;
            text-anchor: middle;
            dominant-baseline: central;
            font-family: 'Segoe UI', sans-serif;
            pointer-events: none;
        }
        .forest-spot-label {
            fill: #fff;
            font-size: 13px;
            font-weight: 600;
            text-anchor: middle;
            dominant-baseline: hanging;
            font-family: 'Segoe UI', sans-serif;
            pointer-events: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        .forest-tree {
            font-size: 28px;
            pointer-events: none;
        }
        .forest-flower {
            font-size: 18px;
            pointer-events: none;
        }
        .forest-mushroom {
            font-size: 20px;
            pointer-events: none;
        }
        .forest-path {
            fill: none;
            stroke: #8b7a5a;
            stroke-width: 8;
            stroke-dasharray: 8 10;
            opacity: 0.5;
        }
        .nut-firework {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            font-size: 1.8rem;
            animation: nutFirework 1.2s ease-out forwards;
        }
        @keyframes nutFirework {
            0% { opacity: 1; transform: translate(0, 0) scale(0.5) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(360deg); }
        }
        .perfect-title {
            background: linear-gradient(135deg, var(--gold), #f5a623);
            color: #1a2a3a;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 0 30px rgba(247, 201, 72, 0.4);
            animation: pulse-gold 1s ease-in-out infinite alternate;
        }
        @keyframes pulse-gold {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(247, 201, 72, 0.3); }
            100% { transform: scale(1.05); box-shadow: 0 0 40px rgba(247, 201, 72, 0.6); }
        }
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
        }
        @media (max-width: 480px) {
            #app { padding: 8px 12px 10px; max-height: 700px; }
            .mascot-img { max-height: 130px; }
            .title { font-size: 1.5rem; }
            .btn-start { font-size: 1.3rem; padding: 14px 28px; max-width: 240px; }
            .btn-forest { font-size: 1.2rem; padding: 12px 24px; max-width: 240px; }
            .btn-shop { font-size: 1.1rem; padding: 10px 20px; max-width: 220px; }
            .btn-next { font-size: 1.2rem; padding: 12px 24px; max-width: 220px; }
            .question-text { font-size: 1rem; }
            .option-btn { font-size: 0.95rem; padding: 10px 14px; min-height: 48px; }
            .option-btn .opt-icon { font-size: 1.5rem; width: 1.6rem; }
            .dot { width: 12px; height: 12px; }
            .btn-tts { width: 32px; height: 32px; font-size: 1.1rem; }

    const STORAGE_KEY = 'nutcracker_data';

    function loadStorage() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) return JSON.parse(raw);
        } catch (_) {}
        return null;
    }

    function saveStorage(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function initStorage() {
        let data = loadStorage();
        if (!data) {
            const progress = {};
            QUESTION_BANK.forEach(q => {
                progress[q.id] = { box: 1, lastSeen: 0, nextReview: 0, successCount: 0 };
            });
            data = {
                progress: progress,
                nuts: 0,
                unlockedThemes: [],
                skins: {
                    purchased: ['default'],
                    equipped: 'default'
                }
            };
            saveStorage(data);
        } else {
            let needUpdate = false;
            QUESTION_BANK.forEach(q => {
                if (!data.progress[q.id]) {
                    data.progress[q.id] = { box: 1, lastSeen: 0, nextReview: 0, successCount: 0 };
                    needUpdate = true;
                }
            });
            if (data.nuts === undefined || data.nuts === null || isNaN(data.nuts)) {
                data.nuts = 0;
                needUpdate = true;
            }
            if (!data.unlockedThemes) {
                data.unlockedThemes = [];
                needUpdate = true;
            }
            if (!data.skins) {
                data.skins = {
                    purchased: ['default'],
                    equipped: 'default'
                };
                needUpdate = true;
            } else {
                // Разрешаем только default, detective, cowboy (удаляем astronaut и другие)
                const validIds = ['default', 'detective', 'cowboy'];
                if (data.skins.purchased) {
                    const filtered = data.skins.purchased.filter(id => validIds.includes(id));
                    if (filtered.length !== data.skins.purchased.length) {
                        data.skins.purchased = filtered;
                        needUpdate = true;
                    }
                }
                if (data.skins.equipped && !validIds.includes(data.skins.equipped)) {
                    data.skins.equipped = 'default';
                    needUpdate = true;
                }
                if (!data.skins.purchased || data.skins.purchased.length === 0) {
                    data.skins.purchased = ['default'];
                    needUpdate = true;
                }
                if (!data.skins.equipped) {
                    data.skins.equipped = 'default';
                    needUpdate = true;
                }
            }
            if (needUpdate) {
                saveStorage(data);
            }
        }
        return data;
    }

    // ============================================================
    let audioCtx = null;

    function getAudioCtx() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioCtx;
    }

    function playTone(freq, duration, type = 'sine', volume = 0.3) {
        try {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(volume, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + duration);
        } catch (e) {}
    }

    function playSound(type) {
        try {
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') {
                ctx.resume();
            }
            switch (type) {
                case 'click':
                    playTone(800, 0.08, 'sine', 0.2);
                    break;
                case 'correct':
                    playTone(523, 0.15, 'sine', 0.3);
                    setTimeout(() => playTone(659, 0.15, 'sine', 0.3), 150);
                    setTimeout(() => playTone(784, 0.2, 'sine', 0.3), 300);
                    break;
                case 'wrong':
                    playTone(300, 0.4, 'sawtooth', 0.15);
                    break;
                case 'complete':
                    [523, 587, 659, 784, 880, 988, 1047].forEach((f, i) => {
                        setTimeout(() => playTone(f, 0.15, 'sine', 0.25), i * 120);
                    });
                    break;
                default:
                    break;
            }
        } catch (e) {}
    }

    let preferredVoice = null;

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        if (!voices || voices.length === 0) return;
        const priority = ['Google русский', 'Microsoft Irina', 'Microsoft Pavel'];
        let selected = null;
        for (const name of priority) {
            const found = voices.find(v => v.name === name && v.lang.startsWith('ru'));
            if (found) {
                selected = found;
                break;
            }
        }
        if (!selected) {
            selected = voices.find(v => v.lang.startsWith('ru'));
        }
        if (!selected && voices.length > 0) {
            selected = voices[0];
        }
        preferredVoice = selected;
        console.log('Выбран голос:', selected ? selected.name : 'не найден');
    }

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = loadVoices;
        if (window.speechSynthesis.getVoices().length > 0) {
            loadVoices();
        } else {
            window.speechSynthesis.addEventListener('voiceschanged', loadVoices);
        }
    }

    function speakText(text, callback) {
        if (!('speechSynthesis' in window)) {
            if (callback) setTimeout(callback, 0);
            return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.8;
        utterance.pitch = 1.15;
        utterance.volume = 1;
        if (preferredVoice) {
            utterance.voice = preferredVoice;
        }
        if (callback) {
            utterance.onend = callback;
        }
        window.speechSynthesis.speak(utterance);
    }

    function speakSequence(texts) {
        if (!texts || texts.length === 0) return;
        let index = 0;
        function speakNext() {
            if (index >= texts.length) return;
            const text = texts[index];
            index++;
            speakText(text, speakNext);
        }
        speakNext();
    }

    // ============================================================
    //  CARD SELECTOR ENGINE
    // ============================================================
    function buildSession(allowedCategoryIds, limit) {
        const today = Date.now();
        let poolIds = [];
        if (allowedCategoryIds && allowedCategoryIds.length > 0) {
            allowedCategoryIds.forEach(catId => {
                const ids = CATEGORIES[catId].ids;
                poolIds.push(...ids);
            });
        } else {
            poolIds = QUESTION_BANK.map(q => q.id);
        }
        poolIds = [...new Set(poolIds)];

        const progress = appData.progress;

        const box1Due = poolIds.filter(id => progress[id].box === 1 && progress[id].nextReview <= today);
        const box2_3Due = poolIds.filter(id => (progress[id].box === 2 || progress[id].box === 3) && progress[id].nextReview <= today);
        const newCards = poolIds.filter(id => progress[id].box === 1 && progress[id].nextReview === 0);

        shuffleArray(box1Due);
        shuffleArray(box2_3Due);
        shuffleArray(newCards);

        let selected = [];

        for (const id of box1Due) {
            if (selected.length >= 2) break;
            if (!selected.includes(id)) selected.push(id);
        }

        for (const id of box2_3Due) {
            if (!selected.includes(id)) {
                selected.push(id);
                break;
            }
        }

        if (selected.length < 2) {
            for (const id of box1Due) {
                if (selected.length >= 2) break;
                if (!selected.includes(id)) selected.push(id);
            }
        }

        for (const id of newCards) {
            if (selected.length >= (limit || 7)) break;
            if (!selected.includes(id)) selected.push(id);
        }

        if (selected.length < (limit || 7)) {
            const unused = poolIds.filter(id => !selected.includes(id));
            shuffleArray(unused);
            const need = (limit || 7) - selected.length;
            selected.push(...unused.slice(0, need));
        }

        shuffleArray(selected);
        return selected;
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

                });

        });

                <div class="price">${skin.price === 0 ? 'Бесплатно' : '🥜 ' + skin.price}</div>
                <button class="btn-buy ${owned ? (equipped ? 'equipped' : 'owned') : (appData.nuts < skin.price ? 'locked' : '')}" data-id="${skin.id}">
                    ${equipped ? '✅ Надето' : (owned ? '👕 Надеть' : (appData.nuts < skin.price ? '🔒 Не хватает' : '🛒 Купить'))}
                </button>
            `;
            const btn = item.querySelector('.btn-buy');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                handleShopAction(skin.id);
            });
            shopGrid.appendChild(item);
        });
    }

    function handleShopAction(skinId) {
        const skin = SKINS.find(s => s.id === skinId);
        if (!skin) return;
        const owned = appData.skins.purchased.includes(skinId);
        const equipped = appData.skins.equipped === skinId;

        if (equipped) {
            playSound('click');
            return;
        }

        if (owned) {
            // Надеть
            appData.skins.equipped = skinId;
            saveStorage(appData);
            renderShop();
            refreshAllMascots();
            playSound('click');
            speakText('Отлично!');
            return;
        }

        // Покупка
        if (appData.nuts >= skin.price) {
            appData.nuts -= skin.price;
            appData.skins.purchased.push(skinId);
            appData.skins.equipped = skinId;
            saveStorage(appData);
            renderShop();
            refreshAllMascots();
            updateNutDisplay();
            playSound('correct');
            fireConfetti(30);
            speakText('Купил!');
        } else {
            playSound('wrong');
            speakText('Не хватает орехов!');
        }
    }

    // ============================================================
    //  RENDER GAME
    // ============================================================
    function renderQuestion() {
        if (sessionQueue.length === 0) {
            finishSession();
            return;
        }

        const id = sessionQueue[0];
        currentQuestionId = id;
        const q = getQuestion(id);
        if (!q) {
            sessionQueue.shift();
            renderQuestion();
            return;
        }

        updateDots();

        optionsContainer.classList.remove('disabled');
        questionArea.classList.remove('slide-up');
        void questionArea.offsetWidth;

        qIcon.textContent = q.icon || '🧐';
        qText.textContent = q.question;

        optionsContainer.innerHTML = '';
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `
                <span class="opt-icon">${opt.icon || '📌'}</span>
                <span class="opt-label">${opt.label}</span>
                <span class="opt-speak" data-opt-text="${opt.label}">🔊</span>
            `;
            btn.dataset.index = index;
            
            const speakBtn = btn.querySelector('.opt-speak');
            speakBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                speakText(speakBtn.dataset.optText);
                playSound('click');
            });

            btn.addEventListener('click', () => handleAnswer(index));
            optionsContainer.appendChild(btn);
        });

        feedbackArea.style.display = 'flex';
        updateMascot('think');
        fbFact.textContent = '';
        btnNext.classList.remove('show');
        btnNext.style.display = 'none';
        isAnswering = false;
        animating = false;

        speakText(q.question);
    }

    function getQuestion(id) {
        return QUESTION_BANK.find(q => q.id === id);
    }

    function updateDots() {
        const total = 7;
        const done = 7 - sessionQueue.length;
        progressDots.innerHTML = '';
        for (let i = 0; i < total; i++) {
            const dot = document.createElement('span');
            dot.className = 'dot';
            if (i < done) dot.classList.add('done');
            else if (i === done && sessionQueue.length > 0) dot.classList.add('current');
            progressDots.appendChild(dot);
        }
    }

    // ============================================================
    //  ANSWER HANDLING
    // ============================================================
    function handleAnswer(selectedIndex) {
        if (isAnswering || animating) return;
        if (sessionQueue.length === 0) return;

        optionsContainer.classList.add('disabled');

        isAnswering = true;
        const id = sessionQueue[0];
        const q = getQuestion(id);
        const progress = getProgress(id);

        const buttons = optionsContainer.querySelectorAll('.option-btn');
        buttons.forEach((btn, idx) => {
            btn.classList.add('disabled');
            if (idx === q.correctIndex) btn.classList.add('reveal-correct');
        });

        const isCorrect = (selectedIndex === q.correctIndex);

        if (isCorrect) {
            playSound('correct');
            buttons[selectedIndex].classList.add('correct');
            fbFact.textContent = q.funFact;
            updateMascot('win');
            fireConfetti(40);

            speakSequence(['Молодец!', q.funFact]);

            questionArea.classList.add('slide-up');

            btnNext.style.display = 'block';
            btnNext.classList.add('show');
            btnNext.style.pointerEvents = 'none';
            setTimeout(() => {
                btnNext.style.pointerEvents = 'auto';
            }, 500);

            let newBox = progress.box;
            if (newBox === 1) newBox = 2;
            else if (newBox === 2) newBox = 3;
            else if (newBox === 3) {
                progress.successCount = (progress.successCount || 0) + 1;
            }
            const days = newBox === 2 ? 2 : (newBox === 3 ? 7 : 0);
            const nextReview = Date.now() + days * 24 * 60 * 60 * 1000;
            updateProgress(id, newBox, nextReview);

            addNut();
            correctCountInSession++;

            sessionQueue.shift();

        } else {
            playSound('wrong');
            buttons[selectedIndex].classList.add('wrong');
            fbFact.textContent = 'Не беда! Давай запомним правильный ответ.';
            speakText('Не беда! Давай запомним правильный ответ.');
            updateMascot('think');
            if (navigator.vibrate) navigator.vibrate(30);

            resetToBox1(id);

            sessionQueue.shift();
            if (sessionQueue.length > 0) {
                sessionQueue.push(id);
            }

            questionArea.classList.add('slide-up');

            btnNext.style.display = 'block';
            btnNext.classList.add('show');
            btnNext.style.pointerEvents = 'none';
            setTimeout(() => {
                btnNext.style.pointerEvents = 'auto';
            }, 500);
        }

        btnNext.onclick = () => {
            playSound('click');
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            if (sessionQueue.length === 0) {
                finishSession();
            } else {
                renderQuestion();
            }
        };
    }

    // ============================================================
    //  FINISH SESSION
    // ============================================================
    function finishSession() {
        playSound('complete');
        fireConfetti(100);

        gameScreen.classList.remove('active');
        resultScreen.classList.add('active');

        resultNuts.textContent = sessionNutsEarned;
        resultStats.textContent = `Ты правильно ответил на ${correctCountInSession} из 7 вопросов!`;

        if (correctCountInSession === 7) {
            perfectBadge.style.display = 'block';
        } else {
            perfectBadge.style.display = 'none';
        }

        resultScreen.classList.add('bounce-in');
        setTimeout(() => {
            resultScreen.classList.remove('bounce-in');
        }, 700);

        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const nut = document.createElement('div');
                nut.className = 'nut-firework';
                nut.textContent = '🥜';
                const x = 40 + Math.random() * 20;
                const y = 20 + Math.random() * 60;
                const tx = (Math.random() - 0.5) * 300;
                const ty = (Math.random() - 0.5) * 300;
                nut.style.left = x + '%';
                nut.style.top = y + '%';
                nut.style.setProperty('--tx', tx + 'px');
                nut.style.setProperty('--ty', ty + 'px');
                nut.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
                document.body.appendChild(nut);
                setTimeout(() => nut.remove(), 1500);
            }, i * 80);
        }

        speakText('Отлично! Ты молодец!');
        updateMascot('win');
        const resultIcon = document.querySelector('.result-icon');
        if (resultIcon) {
            resultIcon.className = 'result-icon';
            resultIcon.classList.add('celebrate');
        }

        refreshUnlockedThemes();

        sessionNutsEarned = 0;
        updateNutDisplay();

        if (isForestMode) {
            isForestMode = false;
            forestCategoryId = null;
            setTimeout(() => {
                resultScreen.classList.remove('active');
                forestScreen.classList.add('active');
                updateMascot('idle');
            }, 3000);
        }
    }

    function getProgress(id) {
        return appData.progress[id];
    }

    function updateProgress(id, newBox, newNextReview) {
        const p = appData.progress[id];
        p.box = newBox;
        p.nextReview = newNextReview;
        p.lastSeen = Date.now();
        if (newBox === 3) p.successCount = (p.successCount || 0) + 1;
        saveStorage(appData);
    }

    function resetToBox1(id) {
        const p = appData.progress[id];
        p.box = 1;
        p.nextReview = 0;
        p.lastSeen = Date.now();
        saveStorage(appData);
    }

    function addNut() {
        if (typeof appData.nuts !== 'number' || isNaN(appData.nuts)) appData.nuts = 0;
        appData.nuts++;
        sessionNutsEarned++;
        saveStorage(appData);
        updateNutDisplay();
        nutIcon.classList.remove('nut-pop');
        void nutIcon.offsetWidth;
        nutIcon.classList.add('nut-pop');
        setTimeout(() => {
            nutIcon.classList.remove('nut-pop');
        }, 500);
    }

    function updateNutDisplay() {
        const nuts = isNaN(appData.nuts) ? 0 : appData.nuts;
        nutsCount.textContent = nuts;
        if (shopNuts) shopNuts.textContent = nuts;
    }

    function refreshAllMascots() {
        updateMascot(currentMascotState);
    }

    // ============================================================
    //  UPDATE REPEAT BUTTON STATE
    // ============================================================
    function updateRepeatButton() {
        const unlocked = getUnlockedCategoryIds();
        if (unlocked.length === 0) {
            btnStart.classList.add('disabled');
            btnStart.textContent = '🔒 Нет тем для повторения';
        } else {
            btnStart.classList.remove('disabled');
            btnStart.textContent = '🔄 Повторить';
        }
    }

    // ============================================================
    //  START SESSION
    // ============================================================
    function startSession(allowedCategoryIds, limit) {
        playSound('click');
        let categoryIds = allowedCategoryIds;
        if (!categoryIds) {
            const unlocked = getUnlockedCategoryIds();
            if (unlocked.length > 0) {
                categoryIds = unlocked;
            } else {
                speakText('Сначала пройди тему в Магическом лесу!');
                return;
            }
        }
        if (limit === undefined) limit = 7;

        sessionQueue = buildSession(categoryIds, limit);
        correctCountInSession = 0;
        sessionNutsEarned = 0;
        isAnswering = false;
        animating = false;

        mainScreen.classList.remove('active');
        gameScreen.classList.add('active');
        resultScreen.classList.remove('active');
        forestScreen.classList.remove('active');
        shopScreen.classList.remove('active');

        renderQuestion();
        updateNutDisplay();
    }

    // ============================================================
    //  SCREEN SWITCHING
    // ============================================================
    function showMainScreen() {
        mainScreen.classList.add('active');
        gameScreen.classList.remove('active');
        resultScreen.classList.remove('active');
        forestScreen.classList.remove('active');
        shopScreen.classList.remove('active');
        updateNutDisplay();
        refreshAllMascots();
        updateMascot('idle');
        isForestMode = false;
        updateRepeatButton();
    }

    function showForestScreen() {
        mainScreen.classList.remove('active');
        gameScreen.classList.remove('active');
        resultScreen.classList.remove('active');
        forestScreen.classList.add('active');
        shopScreen.classList.remove('active');
        renderForest();
        updateNutDisplay();
        refreshAllMascots();
        updateMascot('idle');
        const container = document.getElementById('forestContainer');
        if (container) container.scrollTop = 0;
        updateRepeatButton();
    }

    function showShopScreen() {
        mainScreen.classList.remove('active');
        gameScreen.classList.remove('active');
        resultScreen.classList.remove('active');
        forestScreen.classList.remove('active');
        shopScreen.classList.add('active');
        renderShop();
        updateNutDisplay();
        refreshAllMascots();
        updateMascot('idle');
    }

    // ============================================================
    //  EVENT LISTENERS
    // ============================================================
    btnStart.addEventListener('click', () => {
        const unlocked = getUnlockedCategoryIds();
        if (unlocked.length === 0) {
            speakText('Сначала пройди тему в Магическом лесу!');
            return;
        }
        isForestMode = false;
        startSession(null);
    });

    btnForest.addEventListener('click', () => {
        playSound('click');
        showForestScreen();
    });

    btnShop.addEventListener('click', () => {
        playSound('click');
        showShopScreen();
    });

    btnHome.addEventListener('click', () => {
        playSound('click');
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
        sessionQueue = [];
        showMainScreen();
    });

    backFromForest.addEventListener('click', () => {
        playSound('click');
        showMainScreen();
    });

    backFromShop.addEventListener('click', () => {
        playSound('click');
        showMainScreen();
    });

    btnTts.addEventListener('click', () => {
        if (currentQuestionId) {
            const q = getQuestion(currentQuestionId);
            if (q) {
                speakText(q.question);
                playSound('click');
            }
        }
    });

    // Инициализация
    updateNutDisplay();
    refreshAllMascots();
    updateMascot('idle');
    updateRepeatButton();
    console.log('🐿️ Nutcracker – детектив возвращён с обычным размером, космонавт удалён.');
</script>
</body>
</html>
